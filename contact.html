<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب استشارة برمجية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">معرض أعمالي</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">السيرة الذاتية</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">المدونة</a></li>
                    <li class="nav-item"><a class="nav-link" href="store.html">المتجر</a></li>
                    <li class="nav-item"><a class="nav-link" href="calculator.html">الحاسبة</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">استشارة / تواصل</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm custom-card">
            <h2 class="text-center mb-4 fw-bold text-primary">طلب استشارة أو تواصل</h2>
            <p class="text-center text-muted mb-4">يسعدني تواصلك معي لبناء أفكارك البرمجية وإخراجها للنور.</p>
            
            <form id="consultationForm">
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-bold">الاسم الكامل *</label>
                    <input type="text" class="form-control" id="fullName" placeholder="أدخل اسمك الكريم">
                </div>
                <div class="mb-3">
                    <label for="emailAddress" class="form-label fw-bold">البريد الإلكتروني *</label>
                    <input type="email" class="form-control" id="emailAddress" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="messageText" class="form-label fw-bold">تفاصيل الاستشارة أو الرسالة *</label>
                    <textarea class="form-control" id="messageText" rows="4" placeholder="اكتب تفاصيل طلبك بدقة هنا..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">إرسال الطلب الآن</button>
            </form>
        </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-3 mt-5">
        <p class="mb-0">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
