<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة جافا سكريبت تفاعلية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="index.html">معرض أعمالي</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-end py-2 py-lg-0">
                    <li class="nav-item">
                        <a class="nav-link px-3" id="nav-index" href="index.html">السيرة الذاتية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" id="nav-blog" href="blog.html">المدونة</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" id="nav-store" href="store.html">المتجر</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" id="nav-calculator" href="calculator.html">الحاسبة</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" id="nav-contact" href="contact.html">استشارة / تواصل</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 d-flex flex-column align-items-center">
        <h2 class="mb-4 fw-bold">تطبيق حاسبة برمجية مبسطة</h2>
        
        <div class="card p-4 shadow-lg border-0" style="width: 320px; background-color: #2b3e50;">
            <input type="text" id="calcInput" class="form-control calc-display mb-3 text-end fw-bold" readonly placeholder="0">
            
            <div class="row g-2">
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('7')">7</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('8')">8</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('9')">9</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 py-3 fw-bold" onclick="appendValue('/')">/</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('4')">4</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('5')">5</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('6')">6</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 py-3 fw-bold" onclick="appendValue('*')">*</button></div>
                
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('1')">1</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('2')">2</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('3')">3</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 py-3 fw-bold" onclick="appendValue('-')">-</button></div>
                
                <div class="col-3"><button class="btn btn-danger w-100 py-3 fw-bold" onclick="clearCalc()">C</button></div>
                <div class="col-3"><button class="btn btn-light w-100 py-3 fw-bold" onclick="appendValue('0')">0</button></div>
                <div class="col-3"><button class="btn btn-success w-100 py-3 fw-bold" onclick="calculateResult()">=</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 py-3 fw-bold" onclick="appendValue('+')">+</button></div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-3 mt-5 w-100 position-absolute bottom-0" style="height: 50px;">
        <p class="mb-0">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
